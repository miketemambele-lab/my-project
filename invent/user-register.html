<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - FPOP Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            margin: 20px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h2 {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .register-header p {
            color: #666;
            font-size: 14px;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-control {
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-register:disabled {
            opacity: 0.7;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert-custom {
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle .btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: #666;
        }

        .password-toggle .btn:hover {
            color: #333;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: white;
            text-decoration: none;
        }

        .back-link i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="register-container">
        <div class="register-header">
            <h2><i class="fas fa-user-plus text-primary me-2"></i>User Registration</h2>
            <p>Create your account to access the FPOP inventory system</p>
        </div>

        <div id="alertDiv"></div>

        <form id="userRegisterForm">
            <div class="form-floating">
                <input type="text" class="form-control" id="userName" placeholder="Full Name" required>
                <label for="userName"><i class="fas fa-user me-2"></i>Full Name</label>
            </div>

            <div class="form-floating">
                <input type="email" class="form-control" id="userEmail" placeholder="Email Address" required>
                <label for="userEmail"><i class="fas fa-envelope me-2"></i>Email Address</label>
            </div>

            <div class="form-floating password-toggle">
                <input type="password" class="form-control" id="userPassword" placeholder="Password" required>
                <label for="userPassword"><i class="fas fa-lock me-2"></i>Password</label>
                <button type="button" class="btn" id="togglePassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <div class="form-floating">
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                <label for="confirmPassword"><i class="fas fa-lock me-2"></i>Confirm Password</label>
            </div>

            <button type="submit" class="btn btn-register">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="login-link">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script type="module">
        import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { auth, db } from './js/firebase-config.js';

        // Password toggle functionality
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('userPassword');
            const icon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Form submission
        document.getElementById('userRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userName = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const password = document.getElementById('userPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = e.target.querySelector('button[type="submit"]');

            // Basic validation
            if (!userName || !email || !password || !confirmPassword) {
                showAlert('All fields are required', 'warning');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters long', 'warning');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'warning');
                return;
            }

            // Check network connectivity
            if (!navigator.onLine) {
                showAlert('No internet connection. Please check your network and try again.', 'danger');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating Account...';

            try {
                console.log('Starting user registration process...');

                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;

                console.log('User created in Firebase Auth, UID:', uid);

                // Update profile
                await updateProfile(userCredential.user, { displayName: userName });
                console.log('User profile updated');

                // Store user data in Firestore
                const userData = {
                    uid,
                    email,
                    userName,
                    role: "user",
                    createdAt: new Date(),
                    lastLogin: new Date(),
                    isOnline: true,
                    totalSales: 0,
                    sales: []
                };

                console.log('Storing user data in Firestore:', userData);
                await setDoc(doc(db, "users", uid), userData);

                console.log('User account created successfully');
                showAlert('Account created successfully! You can now login.', 'success');

                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error("Registration error:", error);
                console.error("Error details:", {
                    code: error.code,
                    message: error.message,
                    stack: error.stack
                });

                // Handle specific Firebase errors
                let userFriendlyMessage = error.message;

                switch (error.code) {
                    case 'auth/email-already-in-use':
                        userFriendlyMessage = "This email is already registered. Please use a different email or try logging in.";
                        break;
                    case 'auth/invalid-email':
                        userFriendlyMessage = "Please enter a valid email address.";
                        break;
                    case 'auth/weak-password':
                        userFriendlyMessage = "Password is too weak. Please use at least 6 characters.";
                        break;
                    case 'auth/network-request-failed':
                        userFriendlyMessage = "Network error. Please check your internet connection and try again.";
                        break;
                    case 'permission-denied':
                        userFriendlyMessage = "Permission denied. Please check Firebase security rules.";
                        break;
                    case 'unavailable':
                        userFriendlyMessage = "Service temporarily unavailable. Please try again later.";
                        break;
                    default:
                        userFriendlyMessage = `Registration failed: ${error.message}`;
                }

                showAlert(userFriendlyMessage, 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
            }
        });

        // Show alert function
        function showAlert(message, type = 'danger') {
            const alertDiv = document.getElementById('alertDiv');
            alertDiv.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show alert-custom" role="alert">
                    <i class="fas fa-${type === 'danger' ? 'exclamation-circle' : type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
