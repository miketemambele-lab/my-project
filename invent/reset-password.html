<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FPOP Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-form-container">
            <h2 class="auth-form-title">
                <i class="fas fa-key"></i> Reset Password
            </h2>
            <p class="auth-form-subtitle">Recover your account access</p>

            <div id="alertDiv"></div>

            <form id="resetForm">
                <p style="color: rgba(255, 255, 255, 0.8); font-size: 14px; margin-bottom: 20px;">
                    Enter your email address and we'll send you instructions to reset your password.
                </p>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background: transparent; border-color: rgba(102, 126, 234, 0.3); color: white;">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-custom-primary w-100 mb-3">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <div style="text-align: center; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.2);">
                <p style="color: rgba(255, 255, 255, 0.8);">
                    Remember your password? <a href="login.html" style="color: #667eea; text-decoration: none; font-weight: 600;">Back to Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { resetPassword } from './js/auth.js';

        function showAlert(message, type = 'danger') {
            const alertDiv = document.getElementById('alertDiv');
            alertDiv.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show alert-custom" role="alert">
                    <i class="fas fa-${type === 'danger' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button[type="submit"]');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            const result = await resetPassword(email);
            
            if (result.success) {
                showAlert(result.message, 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                showAlert(result.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
            }
        });
    </script>
</body>
</html>
